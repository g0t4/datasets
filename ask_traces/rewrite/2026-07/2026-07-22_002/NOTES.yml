good: bingo on the new variable and usages!
minor_complaint:
    - I hate when it adds `-l` to `set` in a function
    - function scope is the right choice (default too) for variables in a function!
    - furthermore, -l/--local can cause issues with nested blocks and so let's avoid those entirely
    - function scope is the best of both worlds
      - limited scope (not global)
      - but, global within the function!
